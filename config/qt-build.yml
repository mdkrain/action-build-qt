# ==============================================================================
# Qt Static Build Configuration
# ------------------------------------------------------------------------------
# Edit this file to adjust Qt static build parameters.
# Defaults target RainBook (Qt6: Core, Gui, Qml, Quick, QuickControls2,
# QuickDialogs2, Concurrent).
#
# Build approach (same as vcpkg): each submodule is downloaded and built
# independently via CMake, not via the top-level configure wrapper.
# ==============================================================================

# ── Qt version ──────────────────────────────────────────────────────────────────
qt_version: "6.10.2"

# Submodule source URL template.
# {minor} = major.minor (e.g. 6.10); {version} = qt_version; {submodule} = name
# Each submodule archive is ~50-100 MB (vs ~1 GB for the full single archive).
submodule_url_template: "https://download.qt.io/official_releases/qt/{minor}/{version}/submodules/{submodule}-everywhere-src-{version}.tar.xz"

# ── Submodules to build (in dependency order) ─────────────────────────────────
#   qtbase         -> Core, Gui, Concurrent
#   qtshadertools  -> required by qtdeclarative (RHI shader pipeline)
#   qtdeclarative  -> Qml, Quick, QuickControls, QuickDialogs, QuickLayouts
# Note: Since Qt 6.9, qtquickcontrols2 and qtquickdialogs are merged into
#   qtdeclarative. Qt6::QuickControls2 and Qt6::QuickDialogs2 are provided
#   by qtdeclarative directly.
submodules:
  - qtbase
  - qtshadertools
  - qtdeclarative

# ── CMake options: applied to ALL submodules ──────────────────────────────────
cmake_options_common:
  - "-DBUILD_SHARED_LIBS=OFF"
  - "-DCMAKE_BUILD_TYPE=Release"
  - "-DQT_BUILD_EXAMPLES=OFF"
  - "-DQT_BUILD_TESTS=OFF"
  - "-DQT_BUILD_BENCHMARKS=OFF"
  - "-DQT_USE_DEFAULT_CMAKE_OPTIMIZATION_FLAGS=ON"
  - "-DQT_NO_FORCE_SET_CMAKE_BUILD_TYPE=ON"
  - "-DCMAKE_FIND_PACKAGE_TARGETS_GLOBAL=ON"
  - "-DFEATURE_relocatable=ON"
  - "-DFEATURE_optimize_size=ON"

# ── CMake options: only for qtbase ────────────────────────────────────────────
cmake_options_qtbase:
  # Use Qt's bundled third-party libraries (no system dependencies)
  - "-DINPUT_zlib=qt"
  - "-DINPUT_libpng=qt"
  - "-DINPUT_libjpeg=qt"
  - "-DINPUT_pcre=qt"
  - "-DINPUT_doubleconversion=qt"
  - "-DINPUT_harfbuzz=qt"
  # Disable unneeded features
  - "-DFEATURE_ssl=OFF"
  - "-DFEATURE_widgets=OFF"
  - "-DFEATURE_dbus=OFF"
  - "-DCMAKE_DISABLE_FIND_PACKAGE_LTTngUST=ON"

# ── Platform-specific CMake options (applied to qtbase only) ─────────────────
cmake_options_qtbase_per_platform:
  windows:
    - "-DINPUT_freetype=qt"
    - "-DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"  # /MT static CRT
  linux:
    - "-DINPUT_freetype=system"
    - "-DFEATURE_xcb=ON"
    - "-DINPUT_xcb=yes"
    - "-DINPUT_bundled_xcb_xinput=yes"
    - "-DFEATURE_fontconfig=ON"
    - "-DFEATURE_reduce_exports=ON"  # GCC/Clang only (NOT MSVC)
  macos:
    - "-DINPUT_freetype=qt"
    - "-DFEATURE_framework=OFF"
    - "-DFEATURE_reduce_exports=ON"  # GCC/Clang only (NOT MSVC)

# ── Build optimization ─────────────────────────────────────────────────────────
optimization:
  # Strip debug symbols from static libs after build (Linux/macOS only)
  strip_debug_symbols: true
  # Parallel build jobs. 0 = auto-detect (use all cores).
  parallel_jobs: 0

# ── Artifact package naming ───────────────────────────────────────────────────
# {version} -> qt_version; {platform} -> windows/linux/macos
package_name_template: "qt-{version}-static-{platform}"
