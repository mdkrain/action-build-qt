# =============================================================================
# Qt 静态库构建工作流
# ------------------------------------------------------------------------------
# 在 Windows (MSVC) / Linux (GCC) / macOS (Clang) 三平台上同时构建静态 Qt，
# 并将产物上传到指定的 GitHub Release。
#
# 触发方式：手动（Actions 页面 → Run workflow）
# 输入参数：
#   tag_name   : Release 标签名（如 "qt-static-6.10.2"）。不存在时自动创建。
#   prerelease : 是否标记为预发布（默认 false）
#   draft      : 是否作为草稿创建（默认 false）
#
# 构建参数：见 config/qt-build.yml（修改此文件即可调整 Qt 版本/模块/选项）
# ==============================================================================
name: Build Static Qt

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release 标签名（例如 qt-static-6.10.2）"
        required: true
        type: string
      prerelease:
        description: "标记为预发布"
        required: false
        default: false
        type: boolean
      draft:
        description: "创建为草稿（不会公开发布）"
        required: false
        default: false
        type: boolean

# Release 上传需要写入权限
permissions:
  contents: write

# 防止同一 tag 的并行构建冲突
concurrency:
  group: build-qt-static-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Qt (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360  # Qt 静态构建耗时较长，给 6 小时上限

    strategy:
      fail-fast: false  # 单平台失败不影响其他平台继续构建
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            shell: pwsh
          - platform: linux
            runner: ubuntu-latest
            shell: bash
          - platform: macos
            runner: macos-latest
            shell: bash

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python + PyYAML ─────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PyYAML
        shell: bash
        run: python -m pip install --quiet pyyaml

      # ── 3. 读取 config/qt-build.yml 并导出环境变量 ────────────────────────
      # read-config.py 输出 KEY=VALUE 行，追加到 $GITHUB_ENV 后续步骤可见。
      - name: Read build config
        shell: bash
        run: |
          python scripts/read-config.py config/qt-build.yml >> "$GITHUB_ENV"
          echo "── Parsed build config ──"
          cat "$GITHUB_ENV" | grep -E '^(QT_VERSION|SUBMODULES|CMAKE_OPTIONS_)=' || true

      # ── 4. 安装平台依赖 ────────────────────────────────────────────────────
      # Linux 需要 XCB / Wayland / fontconfig / freetype 等开发包用于 Qt 平台插件。
      # 额外安装 autotools + meson 用于从源码构建静态 XCB/X11/xkbcommon 栈。
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build python3 perl pkg-config flex bison gperf \
            autoconf automake libtool libtool-bin xutils-dev meson python3-pip \
            libgl1-mesa-dev libglu1-mesa-dev \
            libfontconfig1-dev libfreetype6-dev \
            xcb-proto x11proto-dev xtrans-dev libpthread-stubs0-dev \
            libwayland-dev libwayland-egl1-mesa libgles2-mesa-dev

      # macOS runner has Xcode CLT, cmake, ninja, perl. No extra deps needed.

      # ── 4b. Build static OpenSSL (all platforms) ───────────────────────────
      # Static OpenSSL is built from source on all 3 platforms. Qt references
      # OpenSSL symbols (INPUT=linked), and the final executable links
      # Qt6Network.a + libssl + libcrypto. RainBook reuses the same static
      # OpenSSL for its own crypto code — no symbol conflict, shared state.
      - name: Cache static OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}/openssl-static
          key: openssl-static-3.5.0-v3-${{ matrix.platform }}

      - name: Build static OpenSSL (Linux/macOS)
        if: matrix.platform != 'windows' && steps.cache-openssl.outputs.cache-hit != 'true'
        shell: bash
        run: |
          OPENSSL_VERSION="3.5.0"
          OPENSSL_PREFIX="${RUNNER_WORKSPACE}/openssl-static"
          # Explicit arch target (same as vcpkg, not auto-detect via ./config)
          if [ "$RUNNER_OS" = "Linux" ]; then
            OPENSSL_ARCH="linux-x86_64"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            OPENSSL_ARCH="darwin64-arm64"
          fi
          echo "Building OpenSSL ${OPENSSL_VERSION} (${OPENSSL_ARCH}, static) -> ${OPENSSL_PREFIX}"
          cd "${RUNNER_WORKSPACE}"
          curl -L -o openssl.tar.gz \
            "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz"
          tar xzf openssl.tar.gz
          cd "openssl-${OPENSSL_VERSION}"
          # --openssldir inside prefix so install_ssldirs does not touch /etc/ssl.
          # install_sw = libs + headers; skip install_ssldirs (cert dirs not needed).
          ./Configure "${OPENSSL_ARCH}" no-shared no-tests -fPIC \
            --prefix="${OPENSSL_PREFIX}" --openssldir="${OPENSSL_PREFIX}/ssl" --libdir=lib
          make -j"$(nproc)"
          make install_sw

      - name: Install NASM (Windows)
        if: matrix.platform == 'windows' && steps.cache-openssl.outputs.cache-hit != 'true'
        shell: pwsh
        run: choco install nasm -y --no-progress

      - name: Build static OpenSSL (Windows / MSVC)
        if: matrix.platform == 'windows' && steps.cache-openssl.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $OPENSSL_VERSION = "3.5.0"
          $OPENSSL_PREFIX = Join-Path $env:RUNNER_WORKSPACE "openssl-static"
          Set-Location $env:RUNNER_WORKSPACE
          Invoke-WebRequest -Uri "https://github.com/openssl/openssl/releases/download/openssl-$OPENSSL_VERSION/openssl-$OPENSSL_VERSION.tar.gz" -OutFile "openssl.tar.gz"
          tar xzf openssl.tar.gz
          Set-Location "openssl-$OPENSSL_VERSION"

          # Find NASM (installed via choco)
          $nasmPath = (Get-Command nasm -ErrorAction SilentlyContinue).Source
          if (-not $nasmPath) { $nasmPath = "C:\Program Files\NASM\nasm.exe" }
          Write-Host "NASM: $nasmPath"
          $nasmDir = Split-Path $nasmPath -Parent

          # Source vcvars64.bat into PowerShell so cl.exe/nmake.exe are in PATH.
          # We must NOT use `cmd /c "vcvars && set PATH=%PATH% && ..."` because
          # cmd.exe expands %PATH% at parse time, before vcvars64.bat runs,
          # which discards the MSVC tools directory and breaks nmake.
          $vsRoot = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $vcvars = Join-Path $vsRoot "VC\Auxiliary\Build\vcvars64.bat"
          $envOutput = & cmd /c "`"$vcvars`" && set"
          if ($LASTEXITCODE -ne 0) { throw "vcvars64.bat failed with exit code $LASTEXITCODE" }
          foreach ($line in $envOutput) {
            if ($line -match '^([^=]+)=(.*)$') {
              Set-Item -Path "env:$($matches[1])" -Value $matches[2]
            }
          }
          # Prepend NASM so it shadows any bundled copies
          $env:PATH = "$nasmDir;$env:PATH"

          # Verify MSVC tools are now in PATH
          $cl = (Get-Command cl.exe -ErrorAction SilentlyContinue).Source
          $nmake = (Get-Command nmake.exe -ErrorAction SilentlyContinue).Source
          Write-Host "cl.exe   : $cl"
          Write-Host "nmake.exe: $nmake"
          if (-not $cl -or -not $nmake) { throw "MSVC tools not in PATH after vcvars64.bat" }

          # Build with MSVC + NASM assembly (same as vcpkg, no no-asm)
          # --openssldir inside prefix; install_sw = libs + headers only.
          & perl Configure VC-WIN64A no-shared no-tests `
            --prefix="$OPENSSL_PREFIX" --openssldir="$OPENSSL_PREFIX\ssl" --libdir=lib
          if ($LASTEXITCODE -ne 0) { throw "perl Configure failed" }
          & nmake
          if ($LASTEXITCODE -ne 0) { throw "nmake failed" }
          & nmake install_sw
          if ($LASTEXITCODE -ne 0) { throw "nmake install_sw failed" }

      - name: Set OPENSSL_ROOT_DIR
        shell: bash
        run: echo "OPENSSL_ROOT_DIR=${RUNNER_WORKSPACE}/openssl-static" >> "$GITHUB_ENV"

      # ── 4c. Build static XCB stack (Linux only) ─────────────────────────────
      # Builds libXau, libXdmcp, libxcb + all extensions, xcb-util-* family,
      # libxkbcommon + libxkbcommon-x11, libX11 + libX11-xcb as static-only
      # .a files. Eliminates ~15 dynamic deps from the final executable.
      # OpenGL (libGL/libEGL) and glibc remain dynamic by design.
      - name: Cache static XCB stack
        if: matrix.platform == 'linux'
        id: cache-xcb
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}/xcb-static
          key: xcb-static-v3-${{ matrix.platform }}

      - name: Build static XCB stack (Linux)
        if: matrix.platform == 'linux' && steps.cache-xcb.outputs.cache-hit != 'true'
        shell: bash
        run: |
          chmod +x scripts/build-xcb-static.sh
          XCB_STATIC_PREFIX="${RUNNER_WORKSPACE}/xcb-static" \
          RUNNER_WORKSPACE="${RUNNER_WORKSPACE}" \
          bash scripts/build-xcb-static.sh

      - name: Export static XCB paths (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          # Make static XCB visible to Qt's CMake via pkg-config and CMAKE_PREFIX_PATH.
          # The .pc files in xcb-static are already patched (Libs.private merged
          # into Libs by build-xcb-static.sh), so plain `pkg-config --libs` returns
          # full transitive deps. Do NOT set PKG_CONFIG=--static globally: it would
          # also affect system libraries (wayland, libdrm, etc.) and may pull in
          # Libs.private from .pc files whose static versions are unavailable.
          echo "XCB_STATIC_PREFIX=${RUNNER_WORKSPACE}/xcb-static" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${RUNNER_WORKSPACE}/xcb-static/lib/pkgconfig:${RUNNER_WORKSPACE}/xcb-static/share/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          # Also expose via CMAKE_PREFIX_PATH so find_library() can locate .a files
          # directly (not just via pkg-config).
          echo "CMAKE_PREFIX_PATH=${RUNNER_WORKSPACE}/xcb-static${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"

      - name: Verify XCB components (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          # Verify that all 14 XCB components required by Qt's TEST_xcb_syslibs
          # are findable via pkg-config (without --static, since .pc files are
          # already patched). This catches stale cache / incomplete builds.
          echo "=== Installed .pc files ==="
          ls -1 "${RUNNER_WORKSPACE}/xcb-static/lib/pkgconfig/"*.pc 2>/dev/null | sed 's|.*/|  |'
          ls -1 "${RUNNER_WORKSPACE}/xcb-static/share/pkgconfig/"*.pc 2>/dev/null | sed 's|.*/|  |'
          echo ""
          echo "=== Installed .a files ==="
          ls -1 "${RUNNER_WORKSPACE}/xcb-static/lib/"*.a 2>/dev/null | sed 's|.*/|  |'
          echo ""
          echo "=== pkg-config check for each required component ==="
          missing=0
          for comp in \
              xcb xcb-randr xcb-render xcb-renderutil xcb-shape xcb-shm \
              xcb-sync xcb-xfixes xcb-xkb xcb-icccm xcb-util xcb-image \
              xcb-keysyms xcb-cursor xkbcommon xkbcommon-x11; do
              if pkg-config --exists "$comp"; then
                  echo "  OK:  $comp v$(pkg-config --modversion $comp) -> $(pkg-config --libs $comp)"
              else
                  echo "  MISSING: $comp"
                  missing=1
              fi
          done
          echo ""
          echo "=== PKG_CONFIG_PATH ==="
          echo "$PKG_CONFIG_PATH"
          echo ""
          echo "=== PKG_CONFIG env var ==="
          echo "PKG_CONFIG=${PKG_CONFIG:-(not set)}"
          if [[ "$missing" -ne 0 ]]; then
              echo ""
              echo "ERROR: One or more XCB components are missing."
              echo "The cache may be stale (from a previous failed build)."
              echo "To fix: bump the cache key in the workflow file."
              exit 1
          fi

      # ── 5. 缓存 Qt 源码（按 Qt 版本 + 平台作为 key）──────────────────────────
      # 失败重跑或修改配置时可跳过重新下载/解压源码。源码与 CMake 选项无关，
      # 因此 key 不含 config hash。缓存各子模块的源码目录和压缩包。
      - name: Cache Qt source
        id: cache-source
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.workspace }}/qtbase-src
            ${{ runner.workspace }}/qtshadertools-src
            ${{ runner.workspace }}/qtdeclarative-src
            ${{ runner.workspace }}/*.tar.xz
          key: qt-src-${{ matrix.platform }}-${{ env.QT_VERSION }}

      # ── 6. 构建 Qt ──────────────────────────────────────────────────────────
      # 各构建脚本会输出 artifact_path / install_prefix / package_name 到 GITHUB_OUTPUT。
      # 脚本会检测各子模块源码目录是否存在，若已缓存则跳过下载与解压。
      - name: Build Qt (Windows / MSVC)
        if: matrix.platform == 'windows'
        id: build-windows
        shell: pwsh
        env:
          RUNNER_WORKSPACE: ${{ runner.workspace }}
          OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}
        run: ./scripts/build-qt-windows.ps1

      - name: Build Qt (Linux / macOS)
        if: matrix.platform != 'windows'
        id: build-unix
        shell: bash
        env:
          RUNNER_WORKSPACE: ${{ runner.workspace }}
          OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}
          # Linux: static XCB prefix (set by "Export static XCB paths" step).
          # Empty on macOS (no XCB). PKG_CONFIG_PATH / PKG_CONFIG / CMAKE_PREFIX_PATH
          # are also set in GITHUB_ENV and inherited automatically.
          XCB_STATIC_PREFIX: ${{ env.XCB_STATIC_PREFIX }}
        run: |
          chmod +x scripts/build-qt-unix.sh
          bash scripts/build-qt-unix.sh

      # 统一获取产物路径（两个 id 中只有当前平台那个会有值）
      - name: Resolve artifact path
        id: artifact
        shell: bash
        run: |
          ARTIFACT_PATH="${{ steps.build-windows.outputs.artifact_path }}${{ steps.build-unix.outputs.artifact_path }}"
          if [[ -z "$ARTIFACT_PATH" ]]; then
            echo "No artifact path found" >&2
            exit 1
          fi
          echo "artifact_path=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
          echo "Artifact: $ARTIFACT_PATH"
          ls -lh "$ARTIFACT_PATH"

      # ── 7. 上传 artifact（便于调试时下载）───────────────────────────────────
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: qt-static-${{ matrix.platform }}-${{ env.QT_VERSION }}
          path: ${{ steps.artifact.outputs.artifact_path }}
          retention-days: 14
          compression-level: 0  # 产物已压缩，不再二次压缩

      # ── 8. 上传到 GitHub Release ─────────────────────────────────────────────
      # 使用 softprops/action-gh-release：自动创建/更新指定 tag 的 Release。
      # 矩阵中三个 job 各自上传本平台产物到同一 Release，互不冲突。
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: ${{ steps.artifact.outputs.artifact_path }}
          prerelease: ${{ inputs.prerelease }}
          draft: ${{ inputs.draft }}
          name: Qt Static ${{ env.QT_VERSION }}
          body: |
            # Qt Static ${{ env.QT_VERSION }}

            Statically built Qt ${{ env.QT_VERSION }} for the RainBook project.

            ## Submodules
            ${{ env.SUBMODULES }}

            ## Platforms
            - **Windows**: MSVC static CRT (/MT), x86_64
            - **Linux**: GCC + XCB + Wayland, x86_64
            - **macOS**: Clang, arm64 (Apple Silicon)

            ## Build options (vcpkg-style per-module CMake builds)
            - Static build (`BUILD_SHARED_LIBS=OFF`)
            - Size optimization (`FEATURE_optimize_size=ON`)
            - Reduced exports (`FEATURE_reduce_exports=ON`, Linux/macOS only)
            - Disabled: Widgets, D-Bus, SQL (avoids SQLite symbol conflict with vcpkg)
            - Disabled: ICU, Brotli, Zstd (eliminates dynamic deps)
            - SSL: static OpenSSL 3.5.0 (built from source, all platforms)
            - Bundled: zlib, libpng, libjpeg, PCRE2, double-conversion, HarfBuzz, Freetype
            - Linux: XCB + Wayland platform backends
            - Linux: static XCB/X11/xkbcommon stack (built from source, ~15 libs)
            - Linux: static libstdc++/libgcc (`-static-libstdc++ -static-libgcc`)
            - Remaining dynamic deps: glibc (libc/libm/ld-linux), OpenGL (libGL/libEGL)

            ## Usage
            Download the package for your platform, extract it, and set the path
            as `CMAKE_PREFIX_PATH`. RainBook's CMake will find Qt6 via
            `find_package(Qt6)`.

            Full build parameters: see `config/qt-build.yml` in the repo.
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 构建完成后输出汇总 ───────────────────────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Print result
        run: |
          echo "## Qt Static Build Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for platform in windows linux macos; do
            result="${{ needs.build.result }}"
            # 简化展示：所有矩阵结果聚合在 build.result 中
            echo "| $platform | $result |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release tag: ${{ inputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Pre-release: ${{ inputs.prerelease }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If any platform failed, check its job logs for details." >> "$GITHUB_STEP_SUMMARY"
